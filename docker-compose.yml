x-app-environment: &app-environment
  RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  DATABASE_URL: postgres://${POSTGRES_USER:-userstories}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-userstories_production}
  APP_HOST: ${APP_HOST}
  RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
  RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
  ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}
  ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}
  ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-userstories}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-userstories_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-userstories}", "-d", "${POSTGRES_DB:-userstories_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    command: ["./bin/thrust", "./bin/rails", "server"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      RAILS_ALLOWED_HOSTS: ${RAILS_ALLOWED_HOSTS:-}
      RAILS_ASSUME_SSL: ${RAILS_ASSUME_SSL:-true}
      RAILS_FORCE_SSL: ${RAILS_FORCE_SSL:-true}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
    restart: unless-stopped

  umami-db:
    image: postgres:16
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "umami", "-d", "umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-userstories_web}
    build: .
    command: ["bundle", "exec", "good_job", "start"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      JOB_CONCURRENCY: ${JOB_CONCURRENCY:-5}
    restart: unless-stopped

volumes:
  postgres_data:
  umami_db_data:
