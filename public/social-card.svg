<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="102" y1="58" x2="1098" y2="572" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF8F1"/>
      <stop offset="1" stop-color="#F1E7DA"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 140) rotate(132.561) scale(421.883 461.674)">
      <stop stop-color="#6E63FF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#6E63FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="paperGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(198 98) rotate(52.5541) scale(478.53 366.094)">
      <stop stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trayStroke" x1="76" y1="52" x2="1128" y2="578" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
