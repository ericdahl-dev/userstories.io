  <text x="382" y="543" fill="#6A645E" font-family="Avenir Next, Avenir, sans-serif" font-size="16" font-weight="500" letter-spacing="-0.15">No GitHub account needed for stakeholders.</text>

  <g filter="url(#shadowMd)">
