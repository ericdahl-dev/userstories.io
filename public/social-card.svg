    <tspan x="116" dy="66">structured and</tspan>
    <tspan x="116" dy="66">in GitHub.</tspan>
  </text>

  <text x="118" y="438" fill="#5F5A55" font-family="Avenir Next, Avenir, sans-serif" font-size="22" font-weight="500" letter-spacing="-0.15">
