    <rect x="739" y="93" width="354" height="440" rx="28" fill="url(#panelGradient)"/>
    <rect x="739.75" y="93.75" width="352.5" height="438.5" rx="27.25" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>
