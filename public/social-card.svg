    <text x="22" y="31" fill="#F8F5EF" font-family="Avenir Next, Avenir, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.2">Export submissions as CSV</text>
    <text x="22" y="54" fill="#A69FC0" font-family="Avenir Next, Avenir, sans-serif" font-size="14" font-weight="500">Tom B.  ·  Horizon App</text>
