<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Bad request — userstories.io</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        var stored = localStorage.getItem("theme");
        if (stored === "dark" || (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        color: #1c1917;
        background: #fafaf9;
      }
      body::before {
        content: "";
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }
      html.dark body { color: #fafaf9; background: #0c0a09; }
      html.dark body::before { opacity: 0.05; }
      .page { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; }
      .header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid rgba(231, 229, 228, 0.8);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }
      html.dark .header { border-color: rgba(41, 37, 36, 0.8); background: rgba(12, 10, 9, 0.8); }
      .header-inner { max-width: 72rem; margin: 0 auto; }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        color: inherit;
        transition: opacity 0.2s ease;
      }
      .logo:hover { opacity: 0.8; }
      .logo img { width: 1.5rem; height: 1.5rem; flex-shrink: 0; }
      .logo span { font-size: 0.875rem; font-weight: 600; letter-spacing: -0.02em; }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }
      .content { max-width: 28rem; text-align: center; }
      .code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #0d9488;
        margin-bottom: 1rem;
      }
      html.dark .code { color: #2dd4bf; }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        text-wrap: balance;
      }
      p { margin: 0; font-size: 0.9375rem; color: #57534e; text-wrap: pretty; }
      html.dark p { color: #a8a29e; }
      .actions {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn-primary {
        color: #fff;
        background: #0d9488;
        box-shadow: 0 1px 2px rgba(28, 25, 23, 0.08);
      }
      .btn-primary:hover { background: #0f766e; box-shadow: 0 4px 12px rgba(28, 25, 23, 0.12); }
      .btn-primary:active { transform: scale(0.98); }
      .btn-primary:focus-visible { outline: 2px solid #0d9488; outline-offset: 2px; }
      .hint { font-size: 0.8125rem; color: #78716c; }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-inner">
          <a class="logo" href="/">
            <img src="/icon.svg" alt="" width="24" height="24" aria-hidden="true">
            <span>userstories.io</span>
          </a>
        </div>
      </header>

      <main>
        <div class="content">
          <p class="code">400</p>
          <h1>We couldn't read that request</h1>
          <p>The server didn't understand what was sent. Check the URL or form fields and try again.</p>
          <div class="actions">
            <a class="btn btn-primary" href="/">Back to home</a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
